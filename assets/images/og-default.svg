<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="{{COLOR_PRIMARY_LIGHT}}"/>

  <!-- Decorative accent bar -->
  <rect x="0" y="0" width="8" height="630" fill="{{COLOR_ACCENT}}"/>

  <!-- Logo area -->
  <text x="100" y="280" font-family="Georgia, serif" font-size="72" font-weight="600" fill="{{COLOR_PRIMARY}}">{{SITE_LOGO_TEXT}}</text>
  <text x="{{OG_DOT_X}}" y="280" font-family="Georgia, serif" font-size="72" font-weight="600" fill="{{COLOR_ACCENT}}">.</text>

  <!-- Tagline -->
  <text x="100" y="350" font-family="system-ui, sans-serif" font-size="32" fill="#4a4a46">{{SITE_TAGLINE}}</text>

  <!-- Domain -->
  <text x="100" y="550" font-family="system-ui, sans-serif" font-size="24" fill="#6a6a66">{{SITE_DOMAIN}}</text>
</svg>
