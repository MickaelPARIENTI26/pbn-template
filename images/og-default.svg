<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgOG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2f1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1f0d;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bgOG)"/>

  <!-- Bordure dorée -->
  <rect x="20" y="20" width="1160" height="590" rx="8" fill="none" stroke="#C8A96E" stroke-width="2" opacity="0.4"/>

  <!-- Feuille décorative -->
  <g transform="translate(800, 50) rotate(15)" opacity="0.12">
    <path d="M100,400 C100,400 80,300 20,250 C60,260 90,280 100,400Z" fill="#6ab06d"/>
    <path d="M100,400 C100,400 50,280 10,200 C60,230 90,310 100,400Z" fill="#6ab06d"/>
    <path d="M100,400 C100,400 30,250 40,150 C75,200 95,310 100,400Z" fill="#6ab06d"/>
    <path d="M100,400 C100,400 70,230 100,120 C110,200 110,310 100,400Z" fill="#6ab06d"/>
    <path d="M100,400 C100,400 130,230 160,120 C130,200 110,310 100,400Z" fill="#6ab06d"/>
    <path d="M100,400 C100,400 150,200 190,150 C160,200 120,310 100,400Z" fill="#6ab06d"/>
    <line x1="100" y1="400" x2="100" y2="120" stroke="#4a8a4d" stroke-width="2"/>
  </g>

  <!-- Logo / Nom du site centré -->
  <g transform="translate(600, 315)" text-anchor="middle">
    <!-- Point vert décoratif -->
    <circle cx="-160" cy="-60" r="6" fill="#C8A96E"/>

    <!-- Nom du site -->
    <text x="0" y="-40" font-family="Georgia, serif" font-size="72" fill="#ffffff" font-weight="700" letter-spacing="-2">CBD Sport</text>
    <text x="10" y="-40" font-family="Georgia, serif" font-size="72" fill="#C8A96E" font-weight="700">.</text>

    <!-- Ligne décorative -->
    <rect x="-40" y="-15" width="80" height="3" rx="1" fill="#C8A96E"/>

    <!-- Tagline -->
    <text x="0" y="30" font-family="Arial, sans-serif" font-size="22" fill="#a8c4a9" letter-spacing="3">VOTRE GUIDE CBD POUR SPORTIFS</text>

    <!-- URL -->
    <text x="0" y="80" font-family="Arial, sans-serif" font-size="16" fill="#4a8a4d" letter-spacing="1">cbd-sport.fr</text>
  </g>
</svg>
